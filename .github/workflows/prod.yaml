name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dependencies
        run: |
          go mod download

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

  release:
    runs-on: ubuntu-latest
    needs:
      - test
    outputs:
      sha: ${{ steps.short-sha.outputs.sha }}
      build_version: ${{ steps.version.outputs.version }}
      build_valid: ${{ steps.build_valid.outputs.date }}
      helm_changed: ${{ steps.helm_changed.outputs.helm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define next tag
        uses: https://github.com/paulhatch/semantic-version@v5.0.2
        id: version
        with:
          tag_prefix: ""
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          change_path: .
          version_format: "${major}.${minor}.${patch}"

      - name: Create tag
        run: |
          HELM_VERSION=${{ steps.version.outputs.version }}

          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          
          git tag "${{ steps.version.outputs.version }}" -m "[forgejo-action-tag]"
          git push origin --tags

  docker:
    name: Container Image
    runs-on: ubuntu-latest
    needs:
      - release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: reg.h2-invent.com
          username: ${{ secrets.HARBOR_REGISTRY_USER }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            reg.h2-invent.com/public-system-design/jwtproxy:${{ needs.release.outputs.build_version }},
            reg.h2-invent.com/public-system-design/jwtproxy:latest
